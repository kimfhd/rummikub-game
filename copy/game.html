<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rummikub - 严谨排序优化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-blue: #38bdf8;
        }

        body { 
            background-color: var(--bg-dark); 
            overscroll-behavior-y: contain; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 牌的基本样式 */
        .rummi-tile {
            width: 42px;
            height: 58px;
            flex-shrink: 0;
            background: #ffffff;
            border-radius: 6px;
            box-shadow: 0 4px 0 #cbd5e1, 0 6px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 22px;
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
            touch-action: none;
        }

        .rummi-tile:active { cursor: grabbing; }

        /* 拖拽中的原始牌样式 */
        .rummi-tile.dragging-original {
            opacity: 0.3;
            transform: scale(0.8);
        }

        /* 连选样式 */
        .rummi-tile.multi-selected {
            box-shadow: 0 0 15px var(--accent-blue), 0 4px 0 #0284c7;
            transform: translateY(-10px);
            z-index: 40;
        }

        /* 新牌(本回合操作的牌)特效 */
        .rummi-tile.new-tile {
            box-shadow: 0 0 0 2px var(--accent-blue), 0 4px 0 #0284c7;
            animation: highlight-pulse 2s infinite;
        }

        @keyframes highlight-pulse {
            0% { box-shadow: 0 0 0 2px var(--accent-blue), 0 4px 0 #0284c7; }
            50% { box-shadow: 0 0 12px 4px var(--accent-blue), 0 4px 0 #0284c7; }
            100% { box-shadow: 0 0 0 2px var(--accent-blue), 0 4px 0 #0284c7; }
        }

        /* 摸牌弹入动画 */
        .tile-draw-anim {
            animation: tile-pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes tile-pop-in {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .rummi-tile.locked-tile {
            background: #f1f5f9;
            box-shadow: 0 2px 0 #94a3b8, 0 4px 8px rgba(0,0,0,0.2);
            filter: saturate(0.6);
            cursor: default;
        }

        .rummi-tile.on-board {
            width: 38px;
            height: 52px;
            font-size: 18px;
        }

        /* 颜色定义 */
        .color-black { color: #1e293b; }
        .color-red { color: #ef4444; }
        .color-blue { color: #3b82f6; }
        .color-orange { color: #f97316; }

        .game-board {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .meld-group {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.06);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            gap: 6px;
            min-height: 80px;
            flex-wrap: wrap;
            align-items: center;
            transition: background 0.2s;
        }

        .meld-group.invalid {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
        }

        .rack-container {
            background: var(--panel-dark);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .rack-row {
            display: flex;
            gap: 6px;
            min-height: 74px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
            overflow-x: auto;
            align-items: center;
            scrollbar-width: none; 
            white-space: nowrap;
        }
        .rack-row::-webkit-scrollbar { display: none; }

        @keyframes pop {
            0% { transform: translate(-50%, 20px); opacity: 0; }
            15% { transform: translate(-50%, 0); opacity: 1; }
            85% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -20px); opacity: 0; }
        }
        .animate-pop { animation: pop 2.5s forwards; }

        #drag-ghost-container { position: fixed; top: -1000px; left: -1000px; display: flex; pointer-events: none; z-index: 999; }
        .ghost-tile {
            width: 42px; height: 58px; background: #fff; border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 22px; border: 1px solid rgba(0,0,0,0.1);
            position: absolute; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <header class="p-4 bg-black/40 flex justify-between items-center border-b border-white/10 shrink-0">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-black tracking-tighter text-blue-400">RUMMIKUB</h1>
            <div class="flex gap-4">
                <div class="flex flex-col">
                    <span class="text-[9px] uppercase text-slate-500 font-bold tracking-widest">手牌</span>
                    <span id="playerHandCount" class="text-lg font-black text-white">--</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] uppercase text-slate-500 font-bold tracking-widest">牌堆</span>
                    <span id="deckCount" class="text-lg font-black text-orange-400">--</span>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="window.resetTurn()" class="px-3 py-1.5 bg-slate-800 rounded-lg text-[10px] font-bold border border-white/5 active:scale-95 transition-all">重做本回合</button>
        </div>
    </header>

    <div id="announcer" class="pointer-events-none"></div>
    <div id="drag-ghost-container"></div>

    <main class="game-board" id="mainBoard">
        <div id="meldContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </main>

    <footer class="rack-container shrink-0">
        <div class="max-w-6xl mx-auto flex flex-col gap-2">
            <div class="flex justify-between items-center px-1 mb-1">
                <div class="flex gap-2">
                    <button id="sortRunsBtn" onclick="window.setSortMode('runs')" class="sort-btn text-[9px] font-bold px-3 py-1.5 rounded-full border border-white/10 transition-all">按颜色排序</button>
                    <button id="sortGroupsBtn" onclick="window.setSortMode('groups')" class="sort-btn text-[9px] font-bold px-3 py-1.5 rounded-full border border-white/10 transition-all">按数字排序</button>
                </div>
                <div id="iceStatus" class="text-[9px] font-black px-3 py-1.5 rounded-full uppercase border tracking-wider">未破冰</div>
            </div>

            <div id="rackRow0" class="rack-row" data-row="0"></div>
            <div id="rackRow1" class="rack-row" data-row="1"></div>

            <div class="flex gap-3 h-12 mt-1">
                <button id="drawBtn" onclick="window.handleDraw()" class="flex-1 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold border border-white/5 text-sm active:scale-95 transition-all">摸牌</button>
                <button id="finishBtn" onclick="window.finishTurn()" class="flex-[3] rounded-xl font-black transition-all active:scale-95 flex flex-col items-center justify-center shadow-lg">
                    <span class="text-sm">结束回合</span>
                    <span id="scoreHint" class="text-[9px] font-medium opacity-80">出分: 0</span>
                </button>
            </div>
        </div>
    </footer>

    <script>
        // 常量定义
        const COLORS = ['color-black', 'color-red', 'color-blue', 'color-orange'];
        const COLOR_ORDER = { 'color-black': 1, 'color-red': 2, 'color-blue': 3, 'color-orange': 4 };
        const MAX_PER_ROW = 16; 
        
        class Tile {
            constructor(val, color, type = 'number') {
                this.id = Math.random().toString(36).substr(2, 9);
                this.value = val;
                this.color = color;
                this.type = type;
                this.isNew = false; 
                this.isJustDrawn = false; 
            }
        }

        let state = {
            deck: [],
            handRows: [[], []], 
            boardMelds: [],
            isBrokenIce: false,
            sortMode: 'manual', 
            initialHandState: null, 
            initialBoardState: null,
            draggedItem: null,
            pressTimer: null,
            multiSelection: null 
        };

        function init() {
            state.deck = [];
            for (let s=0; s<2; s++) {
                COLORS.forEach(c => {
                    for (let v=1; v<=13; v++) state.deck.push(new Tile(v, c));
                });
            }
            state.deck.push(new Tile('☻', 'color-red', 'joker'));
            state.deck.push(new Tile('☻', 'color-black', 'joker'));
            shuffle(state.deck);
            
            const initialHand = state.deck.splice(0, 14);
            state.handRows[0] = initialHand.slice(0, 7);
            state.handRows[1] = initialHand.slice(7);
            
            // 初始可选定一种排序，默认设置为颜色排序
            state.sortMode = 'runs';
            applyCurrentSort();
            
            saveTurnState();
            render();
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function saveTurnState() {
            state.initialHandState = JSON.parse(JSON.stringify(state.handRows));
            state.initialBoardState = JSON.parse(JSON.stringify(state.boardMelds));
        }

        function render() {
            document.getElementById('deckCount').innerText = state.deck.length;
            const totalHandCount = state.handRows[0].length + state.handRows[1].length;
            document.getElementById('playerHandCount').innerText = totalHandCount;
            
            // 更新按钮状态
            document.querySelectorAll('.sort-btn').forEach(btn => {
                const mode = btn.id === 'sortRunsBtn' ? 'runs' : 'groups';
                if (state.sortMode === mode) {
                    btn.classList.add('bg-blue-500', 'text-white', 'border-blue-400');
                    btn.classList.remove('bg-white/5', 'text-slate-300');
                } else {
                    btn.classList.remove('bg-blue-500', 'text-white', 'border-blue-400');
                    btn.classList.add('bg-white/5', 'text-slate-300');
                }
            });

            const ice = document.getElementById('iceStatus');
            ice.innerText = state.isBrokenIce ? "已破冰" : "未破冰 (需30分)";
            ice.className = `text-[9px] font-black px-3 py-1.5 rounded-full border ${state.isBrokenIce ? 'bg-green-500/10 text-green-400 border-green-500/20' : 'bg-red-500/10 text-red-400 border-red-500/30'}`;

            [0, 1].forEach(rIdx => {
                const rowEl = document.getElementById(`rackRow${rIdx}`);
                rowEl.innerHTML = '';
                state.handRows[rIdx].forEach((tile, tIdx) => {
                    const el = createTileEl(tile);
                    el.draggable = true;
                    el.dataset.index = tIdx;

                    if (state.multiSelection && state.multiSelection.rowIdx === rIdx && 
                        tIdx >= state.multiSelection.startIndex && 
                        tIdx < state.multiSelection.startIndex + state.multiSelection.count) {
                        el.classList.add('multi-selected');
                    }
                    
                    const handleLongPress = () => {
                        state.pressTimer = setTimeout(() => identifyPotentialMeld(rIdx, tIdx), 600);
                    };
                    el.onmousedown = handleLongPress;
                    el.onmouseup = () => clearTimeout(state.pressTimer);
                    el.ontouchstart = handleLongPress;
                    el.ontouchend = () => clearTimeout(state.pressTimer);

                    el.ondragstart = (e) => {
                        clearTimeout(state.pressTimer);
                        let tilesToDrag = [];
                        if (state.multiSelection && state.multiSelection.rowIdx === rIdx && tIdx >= state.multiSelection.startIndex && tIdx < state.multiSelection.startIndex + state.multiSelection.count) {
                            tilesToDrag = state.handRows[rIdx].slice(state.multiSelection.startIndex, state.multiSelection.startIndex + state.multiSelection.count);
                            state.draggedItem = { source: 'hand_multi', rowIdx: rIdx, startIndex: state.multiSelection.startIndex, count: state.multiSelection.count, tiles: tilesToDrag };
                        } else {
                            state.multiSelection = null; 
                            tilesToDrag = [tile];
                            state.draggedItem = { source: 'hand', rowIdx: rIdx, tIdx: tIdx, tile: tile };
                        }
                        const ghost = prepareDragGhost(tilesToDrag);
                        e.dataTransfer.setDragImage(ghost, 20, 30);
                        el.classList.add('dragging-original');
                    };

                    el.ondragend = () => {
                        el.classList.remove('dragging-original');
                        state.multiSelection = null;
                        render();
                    };
                    rowEl.appendChild(el);
                    if(tile.isJustDrawn) setTimeout(() => { tile.isJustDrawn = false; }, 500);
                });

                rowEl.ondragover = (e) => e.preventDefault();
                rowEl.ondrop = (e) => { e.preventDefault(); handleDropOnRack(e, rIdx); };
            });

            const container = document.getElementById('meldContainer');
            container.innerHTML = '';
            let currentBoardScore = 0;
            
            state.boardMelds.forEach((meld, mIdx) => {
                const groupEl = document.createElement('div');
                const isValid = validateMeld(meld);
                groupEl.className = `meld-group ${isValid ? '' : 'invalid'}`;
                groupEl.ondragover = (e) => e.preventDefault();
                groupEl.ondrop = (e) => { e.preventDefault(); handleDropOnMeld(mIdx); };

                meld.forEach((tile, tIdx) => {
                    const tEl = createTileEl(tile, true);
                    tEl.draggable = true;
                    tEl.ondragstart = (e) => {
                        if (!state.isBrokenIce && !tile.isNew) {
                            e.preventDefault();
                            showToast("破冰前禁止操作桌面旧牌", "info");
                            return;
                        }
                        state.draggedItem = { source: 'board', mIdx: mIdx, tIdx: tIdx, tile: tile };
                        const ghost = prepareDragGhost([tile]);
                        e.dataTransfer.setDragImage(ghost, 20, 30);
                    };
                    
                    tEl.onclick = () => {
                        if (!tile.isNew && !state.isBrokenIce) return showToast("未破冰不可取回旧牌", "info");
                        const recovered = state.boardMelds[mIdx].splice(tIdx, 1)[0];
                        recovered.isJustDrawn = true; 
                        addTileToHand(recovered);
                        state.boardMelds = state.boardMelds.filter(m => m.length > 0);
                        render();
                    };
                    groupEl.appendChild(tEl);
                    if (tile.isNew) {
                        currentBoardScore += (tile.type === 'joker' ? 10 : (typeof tile.value === 'number' ? tile.value : 0));
                    }
                });
                container.appendChild(groupEl);
            });

            const placeholder = document.createElement('div');
            placeholder.className = 'meld-group border-dashed border-white/10 justify-center items-center text-[10px] text-white/20 uppercase font-bold h-[80px] cursor-pointer hover:bg-white/5';
            placeholder.innerText = '+ 新牌组';
            placeholder.onclick = () => { state.boardMelds.push([]); render(); };
            placeholder.ondrop = (e) => { e.preventDefault(); state.boardMelds.push([]); handleDropOnMeld(state.boardMelds.length - 1); };
            placeholder.ondragover = (e) => e.preventDefault();
            container.appendChild(placeholder);
            
            const scoreHint = document.getElementById('scoreHint');
            scoreHint.innerText = `出分: ${currentBoardScore}`;
            const btn = document.getElementById('finishBtn');
            const hasNewOnBoard = state.boardMelds.some(m => m.some(t => t.isNew));
            const canFinish = (currentBoardScore >= 30 || state.isBrokenIce) && hasNewOnBoard;
            
            if (canFinish) {
                btn.className = `flex-[3] rounded-xl font-black transition-all active:scale-95 flex flex-col items-center justify-center shadow-lg bg-gradient-to-r from-blue-600 to-indigo-600 shadow-blue-500/20`;
                btn.disabled = false;
            } else {
                btn.className = `flex-[3] rounded-xl font-black transition-all flex flex-col items-center justify-center bg-slate-700 opacity-50 cursor-not-allowed`;
                btn.disabled = true;
            }
        }

        function createTileEl(tile, onBoard = false) {
            const div = document.createElement('div');
            const statusClass = onBoard ? (tile.isNew ? 'new-tile' : 'locked-tile') : (tile.isNew ? 'new-tile' : '');
            const animClass = tile.isJustDrawn ? 'tile-draw-anim' : '';
            div.className = `rummi-tile ${tile.color} ${onBoard ? 'on-board' : ''} ${statusClass} ${animClass}`;
            div.innerHTML = tile.type === 'joker' ? '<span class="text-3xl">☻</span>' : tile.value;
            return div;
        }

        function prepareDragGhost(tiles) {
            const container = document.getElementById('drag-ghost-container');
            container.innerHTML = '';
            tiles.forEach((tile, i) => {
                const ghost = document.createElement('div');
                ghost.className = `ghost-tile ${tile.color}`;
                ghost.innerHTML = tile.type === 'joker' ? '☻' : tile.value;
                ghost.style.left = `${i * 12}px`;
                ghost.style.top = `${i * 4}px`;
                ghost.style.zIndex = 100 - i;
                container.appendChild(ghost);
            });
            return container;
        }

        function addTileToHand(tile) {
            tile.isNew = false; 
            state.handRows[1].push(tile);
            // 每次放回手牌都执行一次当前排序，保持整齐
            if (state.sortMode !== 'manual') applyCurrentSort();
        }

        window.handleDraw = function() {
            let hasNewOnBoard = state.boardMelds.some(m => m.some(t => t.isNew));
            if (hasNewOnBoard || !state.boardMelds.every(m => m.length === 0 || validateMeld(m))) {
                // 如果桌子上有移动或非法，摸牌触发重置
                state.boardMelds = JSON.parse(JSON.stringify(state.initialBoardState));
                state.handRows = JSON.parse(JSON.stringify(state.initialHandState));
            }
            
            if (state.deck.length > 0) {
                const t = state.deck.pop();
                t.isNew = false; 
                t.isJustDrawn = true;
                
                // 核心逻辑：加入手牌并根据当前模式自动排序
                state.handRows[1].push(t);
                if (state.sortMode !== 'manual') applyCurrentSort();
                
                showToast("摸牌：回合结束", "success");
                finalizeTurn(); 
            } else {
                showToast("牌堆已空！", "error");
            }
        };

        window.setSortMode = function(mode) {
            if (state.sortMode === mode) state.sortMode = 'manual';
            else state.sortMode = mode;
            if (state.sortMode !== 'manual') applyCurrentSort();
            render();
        };

        function applyCurrentSort() {
            let all = [...state.handRows[0], ...state.handRows[1]];
            if (state.sortMode === 'runs') {
                all.sort((a,b) => (a.type==='joker')-(b.type==='joker') || COLOR_ORDER[a.color]-COLOR_ORDER[b.color] || a.value-b.value);
            } else if (state.sortMode === 'groups') {
                all.sort((a,b) => (a.type==='joker')-(b.type==='joker') || a.value-b.value || COLOR_ORDER[a.color]-COLOR_ORDER[b.color]);
            }
            state.handRows[0] = all.slice(0, Math.min(all.length, MAX_PER_ROW));
            state.handRows[1] = all.slice(state.handRows[0].length);
        }

        function handleDropOnMeld(targetMIdx) {
            if (!state.draggedItem) return;
            const { source, rowIdx, mIdx, tIdx, tile, tiles, startIndex, count } = state.draggedItem;

            if (source === 'hand') {
                state.handRows[rowIdx].splice(tIdx, 1);
                tile.isNew = true; 
                state.boardMelds[targetMIdx].push(tile);
            } else if (source === 'hand_multi') {
                state.handRows[rowIdx].splice(startIndex, count);
                tiles.forEach(t => t.isNew = true);
                state.boardMelds[targetMIdx].push(...tiles);
            } else if (source === 'board') {
                state.boardMelds[mIdx].splice(tIdx, 1);
                state.boardMelds[targetMIdx].push(tile);
            }
            
            state.boardMelds[targetMIdx] = sortMeld(state.boardMelds[targetMIdx]);
            state.boardMelds = state.boardMelds.filter(m => m.length > 0);
            state.draggedItem = null;
            render();
        }

        function handleDropOnRack(e, targetRowIdx) {
            if (!state.draggedItem) return;
            const { source, rowIdx, mIdx, tIdx, tile, tiles, startIndex, count } = state.draggedItem;

            let insertIdx = state.handRows[targetRowIdx].length;
            const targetEl = e.target.closest('.rummi-tile');
            if (targetEl && targetEl.parentElement.dataset.row == targetRowIdx) {
                const rect = targetEl.getBoundingClientRect();
                const midX = rect.left + rect.width / 2;
                const idx = parseInt(targetEl.dataset.index);
                insertIdx = e.clientX < midX ? idx : idx + 1;
            }

            if (source.startsWith('hand')) {
                const originIdx = source === 'hand_multi' ? startIndex : tIdx;
                const removed = state.handRows[rowIdx].splice(originIdx, source === 'hand_multi' ? count : 1);
                let actualInsert = insertIdx;
                if (rowIdx === targetRowIdx && originIdx < insertIdx) actualInsert -= removed.length;
                state.handRows[targetRowIdx].splice(Math.max(0, actualInsert), 0, ...removed);
                // 拖动手牌位置后，如果之前有排序模式，拖动通常意味着你想手动调整，所以保持位置
                state.sortMode = 'manual';
            } else {
                state.boardMelds[mIdx].splice(tIdx, 1);
                tile.isNew = false; 
                state.handRows[targetRowIdx].splice(insertIdx, 0, tile);
                state.boardMelds = state.boardMelds.filter(m => m.length > 0);
                if (state.sortMode !== 'manual') applyCurrentSort();
            }

            state.draggedItem = null;
            render();
        }

        function identifyPotentialMeld(rowIdx, startIndex) {
            const row = state.handRows[rowIdx];
            let bestLen = 0;
            for (let len = 3; len <= row.length - startIndex; len++) {
                if (validateMeld(row.slice(startIndex, startIndex + len))) bestLen = len;
            }
            if (bestLen >= 3) {
                state.multiSelection = { rowIdx, startIndex, count: bestLen };
                showToast("已选中合法组", "info");
                render();
            }
        }

        window.resetTurn = function() {
            state.boardMelds = JSON.parse(JSON.stringify(state.initialBoardState));
            state.handRows = JSON.parse(JSON.stringify(state.initialHandState));
            render();
            showToast("已恢复本回合初始状态", "info");
        };

        window.finishTurn = function() {
            if (!state.boardMelds.every(m => m.length === 0 || validateMeld(m))) return showToast("桌上有非法牌组", "error");
            
            let newScore = 0;
            state.boardMelds.forEach(m => m.forEach(t => { if(t.isNew) newScore += (t.type==='joker'?10:t.value); }));
            
            if (!state.isBrokenIce) {
                if (newScore < 30) return showToast(`破冰需至少30分 (当前: ${newScore})`, "error");
                state.isBrokenIce = true;
            }
            
            if (state.handRows[0].length + state.handRows[1].length === 0) {
                alert("🎉 恭喜！你清空了手牌，赢得了本局！");
                location.reload();
                return;
            }

            finalizeTurn();
            showToast("结束回合：操作已锁定", "success");
        };

        function finalizeTurn() {
            state.boardMelds.forEach(m => m.forEach(t => t.isNew = false));
            state.handRows.forEach(r => r.forEach(t => t.isNew = false));
            saveTurnState();
            render();
        }

        function validateMeld(meld) {
            if (meld.length < 3) return false;
            const nums = meld.filter(t => t.type === 'number');
            const jokers = meld.filter(t => t.type === 'joker');
            
            if (meld.length <= 4) {
                const val = nums[0]?.value;
                const colors = new Set(nums.map(n => n.color));
                if (nums.every(n => n.value === val) && colors.size === nums.length) return true;
            }
            
            const colors = new Set(nums.map(n => n.color));
            if (colors.size === 1) {
                const sorted = [...nums].sort((a,b) => a.value - b.value);
                if (new Set(sorted.map(s=>s.value)).size !== sorted.length) return false;
                let gaps = 0;
                for(let i=0; i<sorted.length-1; i++) gaps += (sorted[i+1].value - sorted[i].value - 1);
                if (gaps <= jokers.length) return true;
            }
            return false;
        }

        function sortMeld(meld) {
            const nums = meld.filter(t => t.type === 'number');
            const jokers = meld.filter(t => t.type === 'joker');
            if (nums.length === 0) return jokers;
            if (nums.every(n => n.value === nums[0].value)) nums.sort((a,b) => COLOR_ORDER[a.color] - COLOR_ORDER[b.color]);
            else nums.sort((a, b) => a.value - b.value);
            return [...nums, ...jokers];
        }

        function showToast(msg, type="error") {
            const announcer = document.getElementById('announcer');
            const toast = document.createElement('div');
            const colors = { error: 'bg-red-500', success: 'bg-green-500', info: 'bg-blue-600' };
            toast.className = `fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl shadow-2xl z-[100] text-xs font-black animate-pop border border-white/20 ${colors[type]}`;
            toast.innerText = msg;
            announcer.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        window.onload = init;
    </script>
</body>
