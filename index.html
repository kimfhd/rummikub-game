<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rummikub - 多人联机版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-blue: #38bdf8;
        }

        body { 
            background-color: var(--bg-dark); 
            overscroll-behavior-y: contain; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* UI Screens */
        .screen { display: none; flex-direction: column; height: 100vh; width: 100vw; }
        .screen.active { display: flex; }

        /* 牌的基本样式 */
        .rummi-tile {
            width: 42px;
            height: 58px;
            flex-shrink: 0;
            background: #ffffff;
            border-radius: 6px;
            box-shadow: 0 4px 0 #cbd5e1, 0 6px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 22px;
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
            touch-action: none;
        }

        .rummi-tile:active { cursor: grabbing; }

        .rummi-tile.dragging-original { opacity: 0.3; transform: scale(0.8); }
        .rummi-tile.multi-selected { box-shadow: 0 0 15px var(--accent-blue), 0 4px 0 #0284c7; transform: translateY(-10px); z-index: 40; }
        .rummi-tile.new-tile { box-shadow: 0 0 0 2px var(--accent-blue), 0 4px 0 #0284c7; animation: highlight-pulse 2s infinite; }

        @keyframes highlight-pulse {
            0% { box-shadow: 0 0 0 2px var(--accent-blue), 0 4px 0 #0284c7; }
            50% { box-shadow: 0 0 12px 4px var(--accent-blue), 0 4px 0 #0284c7; }
            100% { box-shadow: 0 0 0 2px var(--accent-blue), 0 4px 0 #0284c7; }
        }

        .tile-draw-anim { animation: tile-pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes tile-pop-in {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .rummi-tile.locked-tile {
            background: #f1f5f9;
            box-shadow: 0 2px 0 #94a3b8, 0 4px 8px rgba(0,0,0,0.2);
            filter: saturate(0.6);
            cursor: default;
        }

        .rummi-tile.on-board { width: 38px; height: 52px; font-size: 18px; }

        /* 颜色定义 */
        .color-black { color: #1e293b; }
        .color-red { color: #ef4444; }
        .color-blue { color: #3b82f6; }
        .color-orange { color: #f97316; }

        .game-board {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .meld-group {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.06);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            gap: 6px;
            min-height: 80px;
            flex-wrap: wrap;
            align-items: center;
            transition: background 0.2s;
        }

        .meld-group.invalid { border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05); }

        .rack-container {
            background: var(--panel-dark);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }
        
        .rack-container.not-my-turn {
            opacity: 0.6;
            pointer-events: none;
        }

        .rack-row {
            display: flex;
            gap: 6px;
            min-height: 74px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
            overflow-x: auto;
            align-items: center;
            scrollbar-width: none; 
            white-space: nowrap;
        }
        .rack-row::-webkit-scrollbar { display: none; }

        @keyframes pop {
            0% { transform: translate(-50%, 20px); opacity: 0; }
            15% { transform: translate(-50%, 0); opacity: 1; }
            85% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -20px); opacity: 0; }
        }
        .animate-pop { animation: pop 2.5s forwards; }

        #drag-ghost-container { position: fixed; top: -1000px; left: -1000px; display: flex; pointer-events: none; z-index: 999; }
        .ghost-tile {
            width: 42px; height: 58px; background: #fff; border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 22px; border: 1px solid rgba(0,0,0,0.1);
            position: absolute; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* 玩家列表横幅 */
        .player-avatars { display: flex; gap: 12px; overflow-x: auto; padding: 10px; background: rgba(0,0,0,0.3); }
        .player-avatar { 
            display: flex; flex-direction: column; align-items: center; 
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px; border: 1px solid transparent;
            min-width: 80px;
        }
        .player-avatar.active-turn { border-color: var(--accent-blue); background: rgba(56, 189, 248, 0.1); }
    </style>
</head>
<body>

    <div id="announcer" class="pointer-events-none"></div>
    <div id="drag-ghost-container"></div>

    <!-- Screen 1: Login / Setup -->
    <div id="screen-setup" class="screen active justify-center items-center p-6">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-700">
            <h1 class="text-3xl font-black tracking-tighter text-blue-400 mb-6 text-center">RUMMIKUB</h1>
            <p class="text-slate-400 text-sm mb-4 text-center" id="authStatus">正在连接服务器...</p>
            <div id="setupForm" class="hidden flex-col gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">你的昵称</label>
                    <input type="text" id="playerNameInput" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white mt-1 outline-none focus:border-blue-500 transition-colors" placeholder="输入名字..." maxlength="10">
                </div>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <button onclick="window.uiCreateRoom()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all active:scale-95">创建房间</button>
                    <button onclick="window.uiShowJoinModal()" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition-all active:scale-95">加入房间</button>
                </div>
            </div>
            <div id="joinForm" class="hidden flex-col gap-4 mt-4 pt-4 border-t border-slate-700">
                <input type="text" id="roomCodeInput" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white uppercase outline-none focus:border-blue-500" placeholder="输入房间码" maxlength="6">
                <button onclick="window.uiJoinRoom()" class="bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-all active:scale-95">确认加入</button>
                <button onclick="window.uiHideJoinModal()" class="text-slate-400 text-sm mt-2">返回</button>
            </div>
        </div>
    </div>

    <!-- Screen 2: Waiting Room -->
    <div id="screen-waiting" class="screen justify-center items-center p-6">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-700 flex flex-col items-center">
            <h2 class="text-xl font-bold text-white mb-2">等待玩家加入</h2>
            <div class="bg-slate-900 px-6 py-3 rounded-lg border border-slate-700 mb-6 flex flex-col items-center">
                <span class="text-xs text-slate-400">房间码</span>
                <span id="displayRoomCode" class="text-3xl font-black text-blue-400 tracking-widest uppercase">------</span>
            </div>
            
            <div class="w-full mb-6">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-2">当前玩家 (<span id="playerCount">0</span>/4)</h3>
                <div id="waitingPlayerList" class="flex flex-col gap-2"></div>
            </div>
            
            <button id="startGameBtn" onclick="window.gameStartLogic()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:opacity-90 text-white font-bold py-3 rounded-lg transition-all active:scale-95 hidden shadow-lg shadow-blue-500/20">开始游戏</button>
            <p id="waitingHostText" class="text-sm text-slate-400 hidden">等待房主开始...</p>
        </div>
    </div>

    <!-- Screen 3: Game Board -->
    <div id="screen-game" class="screen">
        <header class="p-3 bg-black/40 flex flex-col shrink-0 border-b border-white/10">
            <div class="flex justify-between items-center mb-2">
                <div class="flex items-center gap-4">
                    <h1 class="text-lg font-black tracking-tighter text-blue-400">RUMMIKUB</h1>
                    <div class="flex gap-4">
                        <div class="flex flex-col">
                            <span class="text-[9px] uppercase text-slate-500 font-bold tracking-widest">牌堆</span>
                            <span id="deckCount" class="text-lg font-black text-orange-400">--</span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="resetTurnBtn" onclick="window.resetTurn()" class="px-3 py-1.5 bg-slate-800 rounded-lg text-[10px] font-bold border border-white/5 active:scale-95 transition-all">重置本地盘面</button>
                </div>
            </div>
            <div id="playerStatusBar" class="player-avatars rounded-xl"></div>
        </header>

        <main class="game-board" id="mainBoard">
            <div id="meldContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </main>

        <footer id="rackContainer" class="rack-container shrink-0">
            <div id="turnOverlay" class="absolute inset-0 bg-slate-900/80 z-50 flex items-center justify-center rounded-t-2xl hidden backdrop-blur-sm">
                <span class="text-lg font-bold text-white bg-black/50 px-6 py-2 rounded-full border border-white/10" id="turnOverlayText">等待对手操作...</span>
            </div>
            
            <div class="max-w-6xl mx-auto flex flex-col gap-2 relative z-10">
                <div class="flex justify-between items-center px-1 mb-1">
                    <div class="flex gap-2">
                        <button id="sortRunsBtn" onclick="window.setSortMode('runs')" class="sort-btn text-[9px] font-bold px-3 py-1.5 rounded-full border border-white/10 transition-all">按颜色排序</button>
                        <button id="sortGroupsBtn" onclick="window.setSortMode('groups')" class="sort-btn text-[9px] font-bold px-3 py-1.5 rounded-full border border-white/10 transition-all">按数字排序</button>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col items-end">
                            <span class="text-[9px] uppercase text-slate-500 font-bold">我的手牌</span>
                            <span id="playerHandCount" class="text-sm font-black text-white leading-none">0</span>
                        </div>
                        <div id="iceStatus" class="text-[9px] font-black px-3 py-1.5 rounded-full uppercase border tracking-wider">未破冰</div>
                    </div>
                </div>

                <div id="rackRow0" class="rack-row" data-row="0"></div>
                <div id="rackRow1" class="rack-row" data-row="1"></div>

                <div class="flex gap-3 h-12 mt-1">
                    <button id="drawBtn" onclick="window.handleDraw()" class="flex-1 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold border border-white/5 text-sm active:scale-95 transition-all">摸牌</button>
                    <button id="finishBtn" onclick="window.finishTurn()" class="flex-[3] rounded-xl font-black transition-all active:scale-95 flex flex-col items-center justify-center shadow-lg bg-slate-700 opacity-50 cursor-not-allowed">
                        <span class="text-sm">结束回合</span>
                        <span id="scoreHint" class="text-[9px] font-medium opacity-80">出分: 0</span>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const COLORS = ['color-black', 'color-red', 'color-blue', 'color-orange'];
        const COLOR_ORDER = { 'color-black': 1, 'color-red': 2, 'color-blue': 3, 'color-orange': 4 };
        const MAX_PER_ROW = 16;
        
        class Tile {
            constructor(val, color, type = 'number') {
                this.id = Math.random().toString(36).substr(2, 9);
                this.value = val;
                this.color = color;
                this.type = type;
                this.isNew = false; 
                this.isJustDrawn = false; 
            }
        }

        // Global State
        window.user = null;
        window.db = null;
        window.currentRoomId = null;
        window.roomData = null;
        window.unsubscribeRoom = null;
        window.appId = "rummikub_v1"; 

        window.localState = {
            handRows: [[], []], 
            boardMelds: [],
            isBrokenIce: false,
            sortMode: 'runs',
            draggedItem: null,
            pressTimer: null,
            multiSelection: null,
            initialBoardState: null,
            initialHandState: null
        };

        // -------------------------------------------------------------
        // Firebase Auth & Init
        // -------------------------------------------------------------
        const initAuth = async () => {
            const firebaseConfig = {
                apiKey: "AIzaSyDZO5rUi0ig2Z50FycbZQ96EUEOoyyeziw",
                authDomain: "rummikub-multiplayer.firebaseapp.com",
                projectId: "rummikub-multiplayer",
                storageBucket: "rummikub-multiplayer.firebasestorage.app",
                messagingSenderId: "219008004003",
                appId: "1:219008004003:web:fb425ecd6ec7441b2ff416",
                measurementId: "G-FTPB5BDTC9"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            window.db = getFirestore(app);

            onAuthStateChanged(auth, (u) => {
                if (u) {
                    window.user = u;
                    document.getElementById('authStatus').innerText = "在线 (ID: " + u.uid.substr(0, 5) + ")";
                    document.getElementById('setupForm').classList.remove('hidden');
                    document.getElementById('setupForm').classList.add('flex');
                    const savedName = localStorage.getItem('rummikub_name');
                    if(savedName) document.getElementById('playerNameInput').value = savedName;
                }
            });

            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error", error);
                document.getElementById('authStatus').innerText = "服务不可用 (错误: " + error.code + ")";
            }
        };

        initAuth();

        // -------------------------------------------------------------
        // UI & Lobby Actions (Exposed to window)
        // -------------------------------------------------------------
        
        window.uiShowJoinModal = () => {
            document.getElementById('setupForm').classList.add('hidden');
            document.getElementById('joinForm').classList.remove('hidden');
            document.getElementById('joinForm').classList.add('flex');
        };

        window.uiHideJoinModal = () => {
            document.getElementById('joinForm').classList.add('hidden');
            document.getElementById('setupForm').classList.remove('hidden');
            document.getElementById('setupForm').classList.add('flex');
        };

        const switchScreen = (screenId) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        };

        const getPlayerName = () => {
            let name = document.getElementById('playerNameInput').value.trim();
            if (!name) name = "玩家_" + Math.floor(Math.random() * 1000);
            localStorage.setItem('rummikub_name', name);
            return name;
        };

        const getRoomDocRef = (roomId) => doc(window.db, 'rooms', roomId);

        window.uiCreateRoom = async () => {
            if(!window.db || !window.user) return showToast("未连接到服务器");
            const name = getPlayerName();
            const roomId = Math.random().toString(36).substr(2, 5).toUpperCase();
            const roomRef = getRoomDocRef(roomId);

            const initialData = {
                roomId: roomId,
                status: 'waiting',
                hostId: window.user.uid,
                players: [{ uid: window.user.uid, name: name, hasBrokenIce: false, handRows: [[], []] }],
                boardMelds: [],
                deck: [],
                turnIndex: 0,
                winnerId: null,
                lastUpdated: Date.now()
            };

            try {
                await setDoc(roomRef, initialData);
                window.currentRoomId = roomId;
                listenToRoom(roomId);
                switchScreen('screen-waiting');
            } catch (error) {
                showToast("创建失败，请确保Firestore规则已开启测试模式");
            }
        };

        window.uiJoinRoom = async () => {
            if(!window.db || !window.user) return showToast("未连接到服务器");
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if(code.length < 3) return showToast("请输入正确的房间码");
            
            try {
                const roomRef = getRoomDocRef(code);
                const docSnap = await getDoc(roomRef);
                if (!docSnap.exists()) return showToast("房间不存在");

                const data = docSnap.data();
                if (data.status !== 'waiting') return showToast("游戏已开始");
                
                const existingPlayer = data.players.find(p => p.uid === window.user.uid);
                if (!existingPlayer) {
                    data.players.push({ uid: window.user.uid, name: getPlayerName(), hasBrokenIce: false, handRows: [[], []] });
                    await updateDoc(roomRef, { players: data.players });
                }

                window.currentRoomId = code;
                listenToRoom(code);
                switchScreen('screen-waiting');
            } catch (error) {
                showToast("加入失败: " + error.message);
            }
        };

        const listenToRoom = (roomId) => {
            if (window.unsubscribeRoom) window.unsubscribeRoom();
            window.unsubscribeRoom = onSnapshot(getRoomDocRef(roomId), (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();
                window.roomData = data;
                
                if (data.status === 'waiting') updateWaitingUI();
                else if (data.status === 'playing') {
                    if (document.getElementById('screen-game').classList.contains('active')) syncGameUI();
                    else {
                        switchScreen('screen-game');
                        initLocalGame();
                    }
                } else if (data.status === 'finished') {
                    syncGameUI();
                    const win = data.players.find(p => p.uid === data.winnerId);
                    if(win) showWinnerModal(win.name);
                }
            });
        };

        const updateWaitingUI = () => {
            document.getElementById('displayRoomCode').innerText = window.roomData.roomId;
            document.getElementById('playerCount').innerText = window.roomData.players.length;
            const list = document.getElementById('waitingPlayerList');
            list.innerHTML = window.roomData.players.map(p => `
                <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50 flex justify-between">
                    <span class="font-bold">${p.name}</span>
                    ${p.uid === window.roomData.hostId ? '<span class="text-xs text-orange-400">房主</span>' : ''}
                </div>
            `).join('');

            if (window.roomData.hostId === window.user.uid) {
                document.getElementById('startGameBtn').classList.remove('hidden');
                document.getElementById('waitingHostText').classList.add('hidden');
            } else {
                document.getElementById('startGameBtn').classList.add('hidden');
                document.getElementById('waitingHostText').classList.remove('hidden');
            }
        };

        // -------------------------------------------------------------
        // Game Logic & Helpers
        // -------------------------------------------------------------

        window.gameStartLogic = async () => {
            let deck = [];
            for (let s=0; s<2; s++) {
                COLORS.forEach(c => { for (let v=1; v<=13; v++) deck.push(new Tile(v, c)); });
            }
            deck.push(new Tile('☻', 'color-red', 'joker'), new Tile('☻', 'color-black', 'joker'));
            for(let i=deck.length-1; i>0; i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}

            let players = [...window.roomData.players];
            players.forEach(p => {
                const hand = deck.splice(0, 14);
                p.handRows = [hand.slice(0, 7), hand.slice(7)];
            });

            await updateDoc(getRoomDocRef(window.currentRoomId), {
                status: 'playing',
                deck: deck,
                players: players,
                boardMelds: [],
                turnIndex: 0
            });
        };

        const initLocalGame = () => {
            const me = window.roomData.players.find(p => p.uid === window.user.uid);
            window.localState.handRows = JSON.parse(JSON.stringify(me.handRows));
            window.localState.isBrokenIce = me.hasBrokenIce;
            window.localState.boardMelds = JSON.parse(JSON.stringify(window.roomData.boardMelds));
            saveState();
            render();
        };

        const saveState = () => {
            window.localState.initialHandState = JSON.parse(JSON.stringify(window.localState.handRows));
            window.localState.initialBoardState = JSON.parse(JSON.stringify(window.localState.boardMelds));
        };

        const syncGameUI = () => {
            const turnInfo = window.roomData.players[window.roomData.turnIndex];
            const isMe = turnInfo.uid === window.user.uid;
            
            document.getElementById('deckCount').innerText = window.roomData.deck.length;
            document.getElementById('turnOverlay').classList.toggle('hidden', isMe);
            document.getElementById('turnOverlayText').innerText = isMe ? "" : `等待 ${turnInfo.name} 操作...`;
            
            if (!isMe) window.localState.boardMelds = JSON.parse(JSON.stringify(window.roomData.boardMelds));
            render();
        };

        const render = () => {
            const isMe = window.roomData.players[window.roomData.turnIndex].uid === window.user.uid;
            const rackEl0 = document.getElementById('rackRow0');
            const rackEl1 = document.getElementById('rackRow1');
            const boardEl = document.getElementById('meldContainer');

            [rackEl0, rackEl1].forEach((el, idx) => {
                el.innerHTML = '';
                window.localState.handRows[idx].forEach((t, tIdx) => {
                    const tileDiv = createTileEl(t);
                    tileDiv.draggable = isMe;
                    tileDiv.ondragstart = (e) => {
                        window.localState.draggedItem = { from: 'hand', row: idx, index: tIdx, tile: t };
                    };
                    el.appendChild(tileDiv);
                });
                el.ondragover = e => e.preventDefault();
                el.ondrop = e => handleDrop(e, 'hand', idx);
            });

            boardEl.innerHTML = '';
            window.localState.boardMelds.forEach((meld, mIdx) => {
                const group = document.createElement('div');
                group.className = `meld-group ${validateMeld(meld) ? '' : 'invalid'}`;
                meld.forEach((t, tIdx) => {
                    const tileDiv = createTileEl(t, true);
                    tileDiv.draggable = isMe;
                    tileDiv.ondragstart = () => {
                        window.localState.draggedItem = { from: 'board', mIdx, tIdx, tile: t };
                    };
                    group.appendChild(tileDiv);
                });
                group.ondragover = e => e.preventDefault();
                group.ondrop = e => handleDrop(e, 'board', mIdx);
                boardEl.appendChild(group);
            });

            // 新牌组占位
            if (isMe) {
                const plus = document.createElement('div');
                plus.className = "meld-group border-dashed border-white/20 justify-center items-center text-xs opacity-30 h-20 cursor-pointer";
                plus.innerText = "+ 新牌组";
                plus.onclick = () => { window.localState.boardMelds.push([]); render(); };
                plus.ondragover = e => e.preventDefault();
                plus.ondrop = () => { window.localState.boardMelds.push([]); handleDrop(null, 'board', window.localState.boardMelds.length-1); };
                boardEl.appendChild(plus);
            }

            // 更新分值和按钮状态
            let score = 0;
            window.localState.boardMelds.forEach(m => m.forEach(t => { if(t.isNew) score += (t.type==='joker'?10:t.value); }));
            document.getElementById('scoreHint').innerText = `出分: ${score}`;
            document.getElementById('playerHandCount').innerText = window.localState.handRows[0].length + window.localState.handRows[1].length;
            
            const finishBtn = document.getElementById('finishBtn');
            const hasNew = window.localState.boardMelds.some(m => m.some(t => t.isNew));
            if (isMe && hasNew && (window.localState.isBrokenIce || score >= 30) && window.localState.boardMelds.every(m => m.length === 0 || validateMeld(m))) {
                finishBtn.classList.replace('bg-slate-700', 'bg-blue-600');
                finishBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                finishBtn.disabled = false;
            } else {
                finishBtn.classList.replace('bg-blue-600', 'bg-slate-700');
                finishBtn.classList.add('opacity-50', 'cursor-not-allowed');
                finishBtn.disabled = true;
            }
        };

        const handleDrop = (e, to, targetIdx) => {
            const item = window.localState.draggedItem;
            if (!item) return;

            if (item.from === 'hand') window.localState.handRows[item.row].splice(item.index, 1);
            else window.localState.boardMelds[item.mIdx].splice(item.tIdx, 1);

            if (to === 'hand') {
                item.tile.isNew = false;
                window.localState.handRows[targetIdx].push(item.tile);
            } else {
                item.tile.isNew = true;
                window.localState.boardMelds[targetIdx].push(item.tile);
                window.localState.boardMelds[targetIdx].sort((a,b) => a.value - b.value);
            }
            window.localState.boardMelds = window.localState.boardMelds.filter(m => m.length > 0);
            window.localState.draggedItem = null;
            render();
        };

        window.handleDraw = async () => {
            window.localState.boardMelds = JSON.parse(JSON.stringify(window.localState.initialBoardState));
            window.localState.handRows = JSON.parse(JSON.stringify(window.localState.initialHandState));
            let deck = [...window.roomData.deck];
            if (deck.length > 0) {
                const t = deck.pop();
                window.localState.handRows[1].push(t);
                await commit(deck);
            }
        };

        window.finishTurn = async () => {
            window.localState.isBrokenIce = true;
            window.localState.boardMelds.forEach(m => m.forEach(t => t.isNew = false));
            await commit(window.roomData.deck);
        };

        const commit = async (newDeck) => {
            const players = [...window.roomData.players];
            players[window.roomData.turnIndex].handRows = window.localState.handRows;
            players[window.roomData.turnIndex].hasBrokenIce = window.localState.isBrokenIce;

            const isWin = (window.localState.handRows[0].length + window.localState.handRows[1].length) === 0;
            await updateDoc(getRoomDocRef(window.currentRoomId), {
                deck: newDeck,
                boardMelds: window.localState.boardMelds,
                players: players,
                turnIndex: (window.roomData.turnIndex + 1) % players.length,
                status: isWin ? 'finished' : 'playing',
                winnerId: isWin ? window.user.uid : null,
                lastUpdated: Date.now()
            });
            saveState();
        };

        window.resetTurn = () => {
            window.localState.handRows = JSON.parse(JSON.stringify(window.localState.initialHandState));
            window.localState.boardMelds = JSON.parse(JSON.stringify(window.localState.initialBoardState));
            render();
        };

        const createTileEl = (t, onBoard=false) => {
            const d = document.createElement('div');
            d.className = `rummi-tile ${t.color} ${onBoard ? 'on-board' : ''} ${t.isNew ? 'new-tile' : (onBoard ? 'locked-tile' : '')}`;
            d.innerHTML = t.type === 'joker' ? '☻' : t.value;
            return d;
        };

        const validateMeld = (m) => {
            if (m.length < 3) return false;
            const nums = m.filter(x => x.type === 'number');
            if (new Set(nums.map(x => x.color)).size === 1) {
                const v = nums.map(x => x.value).sort((a,b)=>a-b);
                for(let i=0; i<v.length-1; i++) if(v[i+1]-v[i] !== 1) return false;
                return true;
            }
            if (nums.length <= 4 && new Set(nums.map(x => x.value)).size === 1) {
                return new Set(nums.map(x => x.color)).size === nums.length;
            }
            return false;
        };

        const showToast = (m) => {
            const t = document.createElement('div');
            t.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-red-600 px-6 py-3 rounded-full text-white z-[999] animate-pop";
            t.innerText = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        };

        const showWinnerModal = (n) => {
            const m = document.createElement('div');
            m.className = "fixed inset-0 bg-black/90 z-[999] flex flex-col items-center justify-center";
            m.innerHTML = `<h2 class="text-4xl font-black text-blue-400 mb-4">🏆 ${n} 获胜！</h2><button onclick="location.reload()" class="bg-blue-600 px-8 py-3 rounded-full">返回</button>`;
            document.body.appendChild(m);
        };

    </script>
</body>
</html>
